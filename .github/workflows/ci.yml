# ============================================================
# SFDAP — CI/CD Pipeline
# ============================================================
# Her push ve Pull Request'te otomatik olarak:
#   1. Kod kalitesi kontrolü (Ruff lint + format)
#   2. Testleri çalıştırma (pytest, 400+ test)
#   3. Test coverage raporu (HTML + XML artifact)
#   4. Alembic migration smoke test (boş DB → upgrade head)
#   5. Schemathesis property-based API fuzz (shiftFinal Ayşe paketi)
#
# Security taramaları için: bkz. .github/workflows/security.yml
# A11y taramaları için: bkz. .github/workflows/a11y.yml
# ============================================================

name: SFDAP CI Pipeline

on:
  push:
    branches: [main, cycle_8, shiftFinal]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: 🔍 Kod Kalitesi (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu indir
        uses: actions/checkout@v4

      - name: 🐍 Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Ruff kur
        # Pre-commit ve dev ortamı ile aynı sürüm aralığı
        run: pip install "ruff>=0.13.0"

      - name: 🔍 Linting kontrolü
        run: ruff check app/ tests/ alembic/ --output-format=github

      - name: 🎨 Format kontrolü
        run: ruff format --check app/ tests/ alembic/

  test:
    name: 🧪 Test & Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Kodu indir
        uses: actions/checkout@v4

      - name: 🐍 Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: 🧪 Testleri çalıştır (coverage ile)
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=html:coverage_report \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80
        # NOT: pyproject.toml addopts içinde -v zaten var; CI'da
        # tekrar -v eklemiyoruz (gereksiz log).

      - name: 📊 HTML coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_report/
          retention-days: 14

      - name: 📈 XML coverage artifact (Codecov uyumlu)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  migrations:
    name: 🗄️ Alembic Migration Smoke
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Kodu indir
        uses: actions/checkout@v4

      - name: 🐍 Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Boş bir SQLite DB üzerinde tüm migration'ları uygula —
      # autogenerate sonrası migration script'lerinin çalışabilirliği
      # (örn. SoilAnalysis, sensor_reading_monthly_aggregates) garantilenir.
      - name: 🚀 alembic upgrade head (boş DB)
        env:
          DATABASE_URL: "sqlite:///./_ci_migration_test.db"
        run: |
          alembic upgrade head
          alembic current

  fuzz:
    name: 🎲 Schemathesis API Fuzz (shiftFinal Ayşe)
    runs-on: ubuntu-latest
    needs: lint
    # shiftFinal — Ayşe paketi. OpenAPI schema'sından property-based test
    # üretip her GET endpoint'i random param'larla denedik; 500 server-error
    # contract'ını koruruz. Modul tests/test_schemathesis_fuzz.py'de.

    steps:
      - name: 📥 Kodu indir
        uses: actions/checkout@v4

      - name: 🐍 Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # NOT: test_schemathesis_fuzz.py icinde Hypothesis profile derandomize=True
      # ile flake'siz; max_examples=10 ile CI sure bütçesi düşük (~30s).
      # EN: deterministic seed + low example budget keeps the CI run flake-free.
      - name: 🎲 Schemathesis fuzz testleri
        run: pytest tests/test_schemathesis_fuzz.py -v --no-cov
