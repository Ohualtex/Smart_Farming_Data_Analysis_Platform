# ============================================================
# SFDAP — CI/CD Pipeline
# ============================================================
# Her push ve Pull Request'te otomatik olarak:
#   1. Kod kalitesi kontrolü (Ruff linter)
#   2. Testleri çalıştırma (pytest)
#   3. Test coverage raporu oluşturma (pytest-cov)
# ============================================================

name: SFDAP CI Pipeline

on:
  push:
    branches: [ main, cycle_5, cycle_4 ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: 🔍 Kod Kalitesi (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu indir
        uses: actions/checkout@v4

      - name: 🐍 Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Ruff kur
        run: pip install ruff

      - name: 🔍 Linting kontrolü
        run: ruff check app/ tests/ --output-format=github

      - name: 🎨 Format kontrolü
        run: ruff format --check app/ tests/

  test:
    name: 🧪 Test & Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Kodu indir
        uses: actions/checkout@v4

      - name: 🐍 Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: 🧪 Testleri çalıştır (coverage ile)
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=html:coverage_report \
            --cov-fail-under=80 \
            -v

      - name: 📊 Coverage raporunu yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_report/
          retention-days: 14
